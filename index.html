<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css"/>
    <title>Conversor de Moedas</title>
</head>
<body>
    <img src="./assets/logo.gif" class="img-logo" alt="logo" />
    <main>
        <label>
            Converter <b>de</b>
            <select class="currency-select-from">
                <option value="real">R$ Real Brasileiro</option>
                <option value="dolar">US$ Dólar Americano</option>
                <option value="euro">EUR€ Euro</option>
                <option value="libra">£ Libra</option>
                <option value="bitcoin">₿ Bitcoin</option>
                <option value="rublo">₽ Rublo Russo</option>
                <option value="yuan">¥ Yuan</option>
            </select>
        </label>
        <label>
            Converter <b>para</b>
            <select class="currency-select-to">
                <option value="real">R$ Real Brasileiro</option>
                <option value="dolar">US$ Dólar Americano</option>
                <option value="euro">EUR€ Euro</option>
                <option value="libra">£ Libra</option>
                <option value="bitcoin">₿ Bitcoin</option>
                <option value="rublo">₽ Rublo Russo</option>
                <option value="yuan">¥ Yuan</option>
            </select>
        </label>
        <label>
            Valor
            <input class="input-currency" placeholder="R$ 10.000,00">
        </label>
        <button class="convert-button">Converter</button>
        <section>
            <div class="currency-box">
                <img class="currency-image-from" src="./assets/brasil 2.png" alt="moeda-a-converter" />
                <p class="currency" id="currency-name-from">Real</p>
                <p class="currency-value-to-convert">R$ 0,00</p>
            </div>
            <img src="./assets/Vector.png" class="arrow" alt="seta" />
            <div class="currency-box">
                <img class="currency-image-to" src="./assets/estados-unidos (1) 1.png"  alt="moeda-convertida">
                <p class="currency" id="currency-name-to">Dólar</p>
                <p class="currency-value">$ 0.00</p>
            </div>
        </section>
    </main>
</body>
<script src="./script.js"></script>
</html>
